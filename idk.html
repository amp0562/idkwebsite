<html>

<head> 

<style>

containter { display : flex; align-items : center; justify-content : center; height : 70vh;  }

h1 { color : black; text-align : center; vertical-align : middle; }

body { display : flex; background-color : rgb(150, 0, 200); align-items : center; justify-content : center; }

button { background-color : rgb(255, 213, 128); height : 4vh; width : 12vh; font-size : 1.3rem }

input { display : none; height : 4vh; width : 30vh }

</style> 

<title> Sigam </title> 

</head>

<body>

<h1>

<button onclick = 'if (InputElement.style.display == "none") { InputElement.style.display = "flex"; InputElement.innerText = EnteredName; UpdateEnteredName() } else { InputElement.style.display = "none"; UpdateEnteredName() }'> Yo Wassup </button>

<br>

<br>

<input type = "text" id = "inpt">

<br>

<button onclick = 'SayHello(EnteredName)'> Submit </button>
 
</h1> 

</body>

</html>

<script>

function SayHello(Name) {

	alert("Hello " + Name + "!") 

} 

function GetInputElement() {

	return document.getElementById("inpt")

}

let InputElement = GetInputElement()

let EnteredName = InputElement.value

function UpdateEnteredName() {

	EnteredName = InputElement.value

}

</script>
