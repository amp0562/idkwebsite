<html>

<head> 

<style>

h1 { color : black; text-align : center; vertical-align : middle; }

body { display : flex; background-color : rgb(255, 200, 0); align-items : center; justify-content : center; }

button1 { display : inline-grid; align-items : center; user-select : none; color : rgb(175, 255, 0); background-color : rgb(255, 0, 0); height : 6vh; width : 15vh; font-size : 1.1rem; }

button2 { display : inline-grid; align-items : center; user-select : none; color : rgb(0, 255, 255); background-color : rgb(0, 0, 255); height : 6vh; width : 15vh; font-size : 1.1rem; }

input { display : none; height : 4vh; width : 30vh; }

</style> 

<title> Sigam </title> 

</head>

<body>

<h1>

<button2 onclick = 'if (InputElement.style.display == "none") { InputElement.style.display = "flex" } else { InputElement.style.display = "none"; InputElement.value = ""}'> Enter Name </button2>

<br>

<br>

<input type = "text" id = "input">

<br>

<button1 onclick = 'UpdateEnteredName(); SayHello(EnteredName); RequestNotificationPerms()'> Submit </button1>
 
</h1> 

</body>

</html>

<script>

function SayHello(Name) {

	alert("Hello " + Name + "!") 

} 

function GetInputElement() {

	return document.getElementById("input")

}

let InputElement = GetInputElement()

let EnteredName = InputElement.value

function UpdateEnteredName() {

	EnteredName = InputElement.value

}

function RequestNotificationPerms() { 
	
	Notification.requestPermission().then(Perms => {

		if (Perms === "granted") {

			new Notification("Example Notification")

		}
										 
	})

}

</script>
